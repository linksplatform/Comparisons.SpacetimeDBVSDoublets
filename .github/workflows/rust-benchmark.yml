name: Rust Benchmark

on:
  push:
    branches: [main, master]
    paths: ['rust/**', 'spacetime-module/**', '.github/workflows/rust-benchmark.yml']
  pull_request:
    branches: [main, master]
    paths: ['rust/**', 'spacetime-module/**', '.github/workflows/rust-benchmark.yml']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

defaults:
  run:
    working-directory: rust

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          cache-on-failure: "true"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets

      - name: Install SpacetimeDB CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -sSf https://install.spacetimedb.com | sh -s -- -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        working-directory: .

      - name: Install SpacetimeDB CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          iwr https://windows.spacetimedb.com -useb | iex
          echo "$env:LOCALAPPDATA\SpacetimeDB\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        working-directory: .

      - name: Build SpacetimeDB module (WASM)
        run: cargo build --release --target wasm32-unknown-unknown
        working-directory: rust/spacetime-module

      - name: Start SpacetimeDB server (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          spacetime start &
          echo "Waiting for SpacetimeDB server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "SpacetimeDB server is ready"
              break
            fi
            sleep 1
          done
        working-directory: .

      - name: Start SpacetimeDB server (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Start-Process spacetime -ArgumentList "start" -NoNewWindow
          Write-Host "Waiting for SpacetimeDB server to be ready..."
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $r = Invoke-WebRequest -Uri http://localhost:3000/ -UseBasicParsing -ErrorAction Stop
              Write-Host "SpacetimeDB server is ready"
              break
            } catch {
              Start-Sleep -Seconds 1
            }
          }
        working-directory: .

      - name: Publish SpacetimeDB module (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          spacetime publish \
            --server http://localhost:3000 \
            --bin-path target/wasm32-unknown-unknown/release/spacetime_module.wasm \
            --yes \
            benchmark-links
        working-directory: rust/spacetime-module

      - name: Publish SpacetimeDB module (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          spacetime publish `
            --server http://localhost:3000 `
            --bin-path target/wasm32-unknown-unknown/release/spacetime_module.wasm `
            --yes `
            benchmark-links
        working-directory: rust/spacetime-module

      - name: Run tests
        env:
          SPACETIMEDB_URI: http://localhost:3000
          SPACETIMEDB_DB: benchmark-links
        # Run tests sequentially to avoid parallel interference with shared SpacetimeDB state.
        run: cargo test -- --test-threads=1

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          targets: wasm32-unknown-unknown

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install matplotlib numpy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          cache-on-failure: "true"

      - name: Install SpacetimeDB CLI
        run: |
          curl -sSf https://install.spacetimedb.com | sh -s -- -y
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        working-directory: .

      - name: Build SpacetimeDB module (WASM)
        run: cargo build --release --target wasm32-unknown-unknown
        working-directory: rust/spacetime-module

      - name: Start SpacetimeDB server
        run: |
          spacetime start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "SpacetimeDB server is ready"
              break
            fi
            sleep 1
          done
        working-directory: .

      - name: Publish SpacetimeDB module
        run: |
          spacetime publish \
            --server http://localhost:3000 \
            --bin-path target/wasm32-unknown-unknown/release/spacetime_module.wasm \
            --yes \
            benchmark-links
        working-directory: rust/spacetime-module

      - name: Build benchmark
        run: cargo build --release

      - name: Run benchmark
        env:
          BENCHMARK_LINK_COUNT: 1000
          BACKGROUND_LINK_COUNT: 3000
          SPACETIMEDB_URI: http://localhost:3000
          SPACETIMEDB_DB: benchmark-links
        run: cargo bench --bench bench -- --output-format bencher | tee out.txt

      - name: Generate charts
        run: python3 out.py

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit benchmark results
        run: |
          git add -f out.txt bench_rust.png bench_rust_log_scale.png 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            rust/out.txt
            rust/bench_rust.png
            rust/bench_rust_log_scale.png
